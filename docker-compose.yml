version: "3.8"

services:

  api:
    build: .
    ports:
      - "8000:8000"
    command: uvicorn api.api:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app

  dashboard:
    build: .
    ports:
      - "8501:8501"
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0 --server.fileWatcherType none
    volumes:
      - .:/app